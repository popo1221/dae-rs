# ===================================================================
# dae-rs Helm Chart - ConfigMap Template
# ===================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dae-rs.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dae-rs.labels" . | nindent 4 }}
data:
  config.yml: |
    {{- .Values.config.inline | nindent 4 }}
