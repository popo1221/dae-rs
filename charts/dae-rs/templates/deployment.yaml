# ===================================================================
# dae-rs Helm Chart - Deployment Template
# ===================================================================

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "dae-rs.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dae-rs.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "dae-rs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dae-rs.selectorLabels" . | nindent 8 }}
      annotations:
        {{- with .Values.daemonset.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dae-rs.serviceAccountName" . }}
      {{- with .Values.daemonset.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: true
      hostPID: true
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        - name: init-ebpf
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RESOURCE
          command:
            - /bin/sh
            - -c
            - |
              modprobe xdp-util 2>/dev/null || true
              modprobe cls_flower 2>/dev/null || true
          env:
            - name: RUST_LOG
              value: {{ .Values.dae.logLevel }}
      containers:
        - name: dae-rs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.dae.extraArgs }}
          args:
            - run
            - --config
            - /etc/dae/config.yml
            {{- range . }}
            - {{ . }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: RUST_LOG
              value: {{ .Values.dae.logLevel }}
            {{- if .Values.dae.interface }}
            - name: DAE_INTERFACE
              value: {{ .Values.dae.interface }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/dae
              readOnly: true
            - name: xtables
              mountPath: /usr/lib/x86_64-linux-gnu
              readOnly: true
            - name: xtables-alt
              mountPath: /lib/x86_64-linux-gnu
              readOnly: true
            - name: sys
              mountPath: /sys
            - name: run
              mountPath: /run
            - name: log
              mountPath: /var/log/dae
            - name: data
              mountPath: /var/lib/dae
          livenessProbe:
            exec:
              command:
                - pgrep
                - dae
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - pgrep
                - dae
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: {{ include "dae-rs.fullname" . }}-config
            {{- if .Values.config.existingConfigMap }}
            optional: true
            {{- end }}
        - name: xtables
          hostPath:
            path: /usr/lib/x86_64-linux-gnu
        - name: xtables-alt
          hostPath:
            path: /lib/x86_64-linux-gnu
        - name: sys
          hostPath:
            path: /sys
        - name: run
          hostPath:
            path: /run
        - name: log
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "dae-rs.fullname" . }}-log
          {{- else }}
          hostPath:
            path: /var/log/dae
          {{- end }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "dae-rs.fullname" . }}-data
          {{- else }}
          hostPath:
            path: /var/lib/dae
          {{- end }}
