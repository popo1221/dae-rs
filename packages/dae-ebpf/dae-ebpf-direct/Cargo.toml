[package]
name = "dae-ebpf-direct"
version = "0.1.0"
edition = "2021"
description = "Real direct eBPF mode for dae-rs - sockmap-based transparent proxy"
authors = ["dae-rs team"]

[dependencies]
aya = "0.13"
aya-ebpf = "0.1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
anyhow = "1"
thiserror = "1"
dae-ebpf-common = { path = "../dae-ebpf-common" }

[features]
default = []
