[package]
name = "dae-cli"
version = "0.1.0"
edition = "2021"
description = "CLI for dae-rs"

[dependencies]
dae-core = { path = "../dae-core" }
dae-proxy = { path = "../dae-proxy" }
dae-config = { path = "../dae-config" }
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"

# REST API
axum = "0.7"
tower = "0.5"
tower-http = { version = "0.5", features = ["cors", "trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1.0"

[dev-dependencies]
assert_cmd = "2"
