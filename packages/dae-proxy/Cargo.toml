[package]
name = "dae-proxy"
version = "0.1.0"
edition = "2021"
description = "Proxy protocols for dae-rs - Phase 3: User-space proxy core"

[dependencies]
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
socket2 = { version = "0.5", features = ["all"] }
thiserror = "1"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dae-ebpf-common = { path = "../dae-ebpf/dae-ebpf-common" }
dae-config = { path = "../dae-config" }
clap = { version = "4", features = ["derive"] }
ipnet = "2"
maxminddb = "0.27"
notify = "7"
toml = "0.8"
async-trait = "0.1"
tokio-tungstenite = "0.21"
tungstenite = "0.21"

[dev-dependencies]
tokio-test = "0.4"
