[package]
name = "dae-config"
version = "0.1.0"
edition = "2021"
description = "Configuration for dae-rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
ipnet = "2"
thiserror = "1"
base64 = "0.22"
urlencoding = "2"
serde_yaml = "0.9"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
