[workspace]
resolver = "2"
members = [
    "packages/dae-core",
    "packages/dae-cli",
    "packages/dae-config",
    "packages/dae-proxy",
    "packages/dae-ebpf/dae-ebpf-common",
    "packages/dae-ebpf/dae-xdp",
    "packages/dae-ebpf/dae-ebpf",
]

[profile.dev]
opt-level = 0
debug = true

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
