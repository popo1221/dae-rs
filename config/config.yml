# dae-rs minimal configuration example
# This file is used by the Docker container at /etc/dae/config.yml

[proxy]
socks5_listen = "127.0.0.1:1080"
http_listen = "127.0.0.1:8080"
ebpf_interface = "eth0"
ebpf_enabled = false
tcp_timeout = 60
udp_timeout = 30

# No nodes configured - add your proxy nodes here
[[nodes]]
name = "example"
type = "shadowsocks"
server = "127.0.0.1"
port = 8388
method = "chacha20-ietf-poly1305"
password = "example-password"

[rules]
# No rules configured - traffic will be forwarded directly

[logging]
level = "info"
